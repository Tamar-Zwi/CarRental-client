<div style="max-width: 900px; margin: 0 auto; padding: 20px;">
  <h2>מאגר רכבים להשכרה</h2>

  <div style="display: flex; gap: 10px; margin-bottom: 14px;">
    <button type="button" (click)="loadCars()" style="padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; cursor: pointer;">
      רענון רכבים
    </button>
    <button type="button" (click)="seedCars()" [disabled]="isSeeding" style="padding: 8px 12px; border: none; border-radius: 6px; background: #198754; color: #fff; cursor: pointer;">
      {{ isSeeding ? 'ממלא נתונים...' : 'מילוי 20 רכבים לדוגמה' }}
    </button>
  </div>
  
  <div *ngIf="errorMessage" style="color: red; font-weight: bold;">
    {{ errorMessage }}
  </div>

  <div *ngIf="isLoading && !errorMessage">
    <p>טוען רכבים...</p>
  </div>

  <div *ngIf="!isLoading && cars.length === 0 && !errorMessage">
    <p>אין רכבים במאגר כרגע. אפשר ללחוץ על "מילוי 20 רכבים לדוגמה".</p>
  </div>

  <div *ngIf="!isLoading && cars.length > 0" style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px;">
    
    <div *ngFor="let car of cars" style="border: 1px solid #ccc; border-radius: 8px; padding: 15px; width: 250px; background-color: #f9f9f9; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
      
      <h3>קוד רכב: {{ car.code }}</h3>
      <p><b>רמת רכב:</b> {{ car.level }}</p>
      <p><b>מספר מקומות:</b> {{ car.numSeats }}</p>
      <p><b>מחיר ליום:</b> {{ car.priceForDay }} ₪</p>
      <p><b>מחיר ל-3 ימים ומעלה:</b> {{ car.priceForThreeDaysAndMore }} ₪</p>
      
      <button (click)="selectForRent(car)" style="margin-top: 15px; width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
        בחר להשכרה
      </button>

    </div>
  </div>
</div>
