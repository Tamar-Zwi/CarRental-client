<nav class="navbar">
  <div class="navbar-logo">
    <a [routerLink]="authService.customer() ? '/cars' : '/login'" class="logo-link">
      <span style="font-weight:bold; letter-spacing:2px;">Easy</span>
      <span style="color:var(--primary-blue); font-weight:bold;">CARS</span>
      <span style="font-size:1.3rem; color:var(--success-green); vertical-align:middle; margin-right:6px;">&#128663;</span>
    </a>
  </div>
  <ul class="navbar-links">
    @if (!authService.customer()) {
      <li><a [routerLink]="'/login'" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">התחברות</a></li>
      <li><a [routerLink]="'/register'" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">הרשמה</a></li>
      <li><a [routerLink]="'/cars'" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">צפייה ברכבים</a></li>
    } @else {
      <li><a [routerLink]="'/cars'" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">צפייה ברכבים</a></li>
      <li><a [routerLink]="'/my-rentals'" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">ההזמנות שלי</a></li>
      <li>
        <button class="logout-btn" (click)="logout()">התנתק</button>
      </li>
    }
  </ul>
  @if (authService.customer()) {
    <div class="navbar-greeting">
      שלום, <span style="color:var(--success-green); font-weight:bold;">{{ authService.customer()!.firstName }}</span> {{ authService.customer()!.lastName }}
    </div>
  }
</nav>

<main>
  <router-outlet></router-outlet>
</main>
