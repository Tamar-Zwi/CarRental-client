<nav class="navbar">
  <div class="navbar-logo">
    <a [routerLink]="authService.customer() ? '/cars' : '/login'" class="logo-link">Easy CARS</a>
  </div>
  <ul class="navbar-links">
    @if (!authService.customer()) {
      <!-- לא מחובר: התחברות, הרשמה וצפייה ברכבים -->
      <li><a [routerLink]="'/login'" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">התחברות</a></li>
      <li><a [routerLink]="'/register'" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">הרשמה</a></li>
      <li><a [routerLink]="'/cars'" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">צפייה ברכבים</a></li>
    } @else {
      <!-- מחובר: צפייה ברכבים, ההזמנות שלי והתנתק -->
      <li><a [routerLink]="'/cars'" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">צפייה ברכבים</a></li>
      <li><a [routerLink]="'/my-rentals'" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">ההזמנות שלי</a></li>
      <li>
        <button class="logout-btn" (click)="logout()">התנתק</button>
      </li>
    }
  </ul>
  @if (authService.customer()) {
    <div class="navbar-greeting">
      שלום, {{ authService.customer()!.firstName }} {{ authService.customer()!.lastName }}
    </div>
  }
</nav>

<main style="padding: 20px;">
  <router-outlet></router-outlet>
</main>
